global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'mvp-trading-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/metrics'

  - job_name: 'mvp-trading-worker'
    static_configs:
      - targets: ['worker:9464']
    metrics_path: '/metrics'
