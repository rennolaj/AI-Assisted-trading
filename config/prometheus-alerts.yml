# Prometheus Alerting Rules for MVP Trading System

groups:
  - name: alert_processing
    interval: 30s
    rules:
      - alert: HighQueueDepth
        expr: queue_depth > 100
        for: 10m
        labels:
          severity: warning
          component: alert_processing
        annotations:
          summary: "Alert queue depth is critically high"
          description: "Queue depth is {{ $value }} alerts. System may be overwhelmed or processing is stalled."
          
      - alert: LowAlertSuccessRate
        expr: sum(rate(alerts_processed_total{outcome="accepted"}[5m])) / sum(rate(alerts_processed_total[5m])) < 0.5
        for: 15m
        labels:
          severity: warning
          component: alert_processing
        annotations:
          summary: "Alert acceptance rate below 50%"
          description: "Only {{ $value | humanizePercentage }} of alerts are being accepted for execution."
          
      - alert: HighAlertProcessingLatency
        expr: histogram_quantile(0.95, rate(alert_processing_duration_seconds_bucket[5m])) > 10
        for: 10m
        labels:
          severity: warning
          component: alert_processing
        annotations:
          summary: "Alert processing latency is high"
          description: "95th percentile processing time is {{ $value | humanizeDuration }} seconds."

  - name: execution
    interval: 30s
    rules:
      - alert: LowExecutionSuccessRate
        expr: sum(rate(executions_processed_total{outcome=~"filled|placed"}[5m])) / sum(rate(executions_processed_total[5m])) < 0.8
        for: 10m
        labels:
          severity: critical
          component: execution
        annotations:
          summary: "Execution success rate below 80%"
          description: "Success rate is {{ $value | humanizePercentage }}. Check exchange connectivity and risk limits."
          
      - alert: HighExecutionLatency
        expr: histogram_quantile(0.99, rate(execution_duration_seconds_bucket{stage="total"}[5m])) > 30
        for: 10m
        labels:
          severity: warning
          component: execution
        annotations:
          summary: "Execution latency is very high"
          description: "99th percentile execution time is {{ $value | humanizeDuration }} seconds."
          
      - alert: TooManyActiveTrades
        expr: active_trades > 15
        for: 5m
        labels:
          severity: warning
          component: risk_management
        annotations:
          summary: "Too many active trades"
          description: "Currently {{ $value }} active trades. May exceed risk limits."

  - name: system_health
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: sum(rate(errors_total[5m])) > 1
        for: 5m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanize }} errors per second."
          
      - alert: ComponentErrors
        expr: sum by (component) (rate(errors_total[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "Component {{ $labels.component }} has elevated error rate"
          description: "{{ $labels.component }} is generating {{ $value | humanize }} errors per second."
          
      - alert: ReconciliationDiscrepancy
        expr: reconciliation_discrepancies > 0
        for: 15m
        labels:
          severity: critical
          component: reconciliation
        annotations:
          summary: "Reconciliation discrepancies detected"
          description: "{{ $value }} unresolved discrepancies between internal state and exchange. Immediate investigation required."
          
      - alert: HighStopLossRate
        expr: sum(rate(stop_loss_triggered_total[1h])) > 5
        for: 30m
        labels:
          severity: warning
          component: risk_management
        annotations:
          summary: "High stop-loss trigger rate"
          description: "{{ $value | humanize }} stop-losses triggered per second over last hour. Market may be volatile or strategy needs adjustment."

  - name: api_health
    interval: 30s
    rules:
      - alert: HighAPIErrorRate
        expr: sum by (provider) (rate(api_errors_total[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          component: integration
        annotations:
          summary: "High error rate for {{ $labels.provider }} API"
          description: "{{ $labels.provider }} API is experiencing {{ $value | humanize }} errors per second."
          
      - alert: ExchangeAPIDown
        expr: sum(rate(api_errors_total{provider="kraken"}[5m])) > 0.5
        for: 5m
        labels:
          severity: critical
          component: integration
        annotations:
          summary: "Kraken exchange API errors"
          description: "Kraken API is returning {{ $value | humanize }} errors per second. Trading may be impaired."

  - name: dependencies
    interval: 30s
    rules:
      - alert: DatabaseConnectionIssue
        expr: up{job="mvp-trading-api"} == 0 or up{job="mvp-trading-worker"} == 0
        for: 2m
        labels:
          severity: critical
          component: infrastructure
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 2 minutes."
          
      - alert: PrometheusScrapeFailed
        expr: up{job=~"mvp-trading-.*"} == 0
        for: 5m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: "Prometheus cannot scrape {{ $labels.job }}"
          description: "Metrics collection is failing for {{ $labels.job }}. Monitoring may be incomplete."
