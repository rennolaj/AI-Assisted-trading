services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      TradingView__WebhookSecret: "${TRADINGVIEW_WEBHOOK_SECRET:-changeme}"
      Postgres__ConnectionString: "${POSTGRES_CONNECTION_STRING:-Host=postgres;Port=5432;Database=ai-trading-db;Username=postgres;Password=postgres}"
      Redis__ConnectionString: "${REDIS_CONNECTION_STRING:-redis:6379}"
      Redis__AlertQueueKey: "${REDIS_ALERT_QUEUE_KEY:-mvp:alerts}"
      OpenAI__ApiKey: "${OPENAI_API_KEY:-}"
      McpProvider__Provider: "${MCP_PROVIDER:-openai}"
      McpProvider__FallbackOnOpenAi429: "${MCP_FALLBACK_ON_OPENAI_429:-true}"
      LocalLlm__BaseUrl: "${LOCAL_LLM_BASE_URL:-http://localhost:11434/v1/}"
      LocalLlm__ApiKey: "${LOCAL_LLM_API_KEY:-}"
      LocalLlm__ResponsesPath: "${LOCAL_LLM_RESPONSES_PATH:-responses}"
      LocalLlm__ChatCompletionsPath: "${LOCAL_LLM_CHAT_COMPLETIONS_PATH:-chat/completions}"
      LocalLlm__Mode: "${LOCAL_LLM_MODE:-chat}"
      LocalLlm__UseResponseFormat: "${LOCAL_LLM_USE_RESPONSE_FORMAT:-false}"
      LocalLlm__ModelOverride: "${LOCAL_LLM_MODEL_OVERRIDE:-}"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - worker

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Postgres__ConnectionString: "${POSTGRES_CONNECTION_STRING:-Host=postgres;Port=5432;Database=ai-trading-db;Username=postgres;Password=postgres}"
      OpenAI__ApiKey: "${OPENAI_API_KEY:-}"
      McpProvider__Provider: "${MCP_PROVIDER:-openai}"
      McpProvider__FallbackOnOpenAi429: "${MCP_FALLBACK_ON_OPENAI_429:-true}"
      LocalLlm__BaseUrl: "${LOCAL_LLM_BASE_URL:-http://localhost:11434/v1/}"
      LocalLlm__ApiKey: "${LOCAL_LLM_API_KEY:-}"
      LocalLlm__ResponsesPath: "${LOCAL_LLM_RESPONSES_PATH:-responses}"
      LocalLlm__ChatCompletionsPath: "${LOCAL_LLM_CHAT_COMPLETIONS_PATH:-chat/completions}"
      LocalLlm__Mode: "${LOCAL_LLM_MODE:-chat}"
      LocalLlm__UseResponseFormat: "${LOCAL_LLM_USE_RESPONSE_FORMAT:-false}"
      LocalLlm__ModelOverride: "${LOCAL_LLM_MODEL_OVERRIDE:-}"
      McpProvider__ForceAllow: "${MCP_FORCE_ALLOW:-false}"
      KrakenFutures__Environment: "${KRAKEN_FUTURES_ENV:-demo}"
      KrakenFutures__BaseUrl: "${KRAKEN_FUTURES_REST_BASE:-}"
      KrakenFutures__AuthBaseUrl: "${KRAKEN_FUTURES_AUTH_BASE:-}"
      KrakenFutures__WebSocketUrl: "${KRAKEN_FUTURES_WS_URL:-}"
      KrakenFutures__ChartsBaseUrl: "${KRAKEN_FUTURES_CHARTS_BASE:-}"
      KrakenFutures__ChartsTickType: "${KRAKEN_FUTURES_CHARTS_TICK_TYPE:-trade}"
      KrakenFutures__ChartsMaxCandlesPerRequest: "${KRAKEN_FUTURES_CHARTS_MAX_CANDLES:-500}"
      KrakenFutures__ChartsMaxBatches: "${KRAKEN_FUTURES_CHARTS_MAX_BATCHES:-10}"
      KrakenFutures__ChartsFallbackToHistory: "${KRAKEN_FUTURES_CHARTS_FALLBACK_TO_HISTORY:-true}"
      KrakenFutures__TestSymbol: "${KRAKEN_FUTURES_TEST_SYMBOL:-}"
      KrakenFutures__ApiKey: "${KRAKEN_FUTURES_API_KEY:-}"
      KrakenFutures__ApiSecret: "${KRAKEN_FUTURES_API_SECRET:-}"
      KrakenFutures__DemoApiKey: "${KRAKEN_FUTURES_DEMO_API_KEY:-}"
      KrakenFutures__DemoApiSecret: "${KRAKEN_FUTURES_DEMO_API_SECRET:-}"
      KrakenFutures__ProdApiKey: "${KRAKEN_FUTURES_PROD_API_KEY:-}"
      KrakenFutures__ProdApiSecret: "${KRAKEN_FUTURES_PROD_API_SECRET:-}"
      KrakenFutures__TimeoutSeconds: "${KRAKEN_FUTURES_TIMEOUT_SECONDS:-10}"
      Elliott__BaseTimeframe: "${ELLIOTT_BASE_TIMEFRAME:-M1}"
      Elliott__LookbackDays: "${ELLIOTT_LOOKBACK_DAYS:-1}"
      MarketData__Mode: "${MARKETDATA_MODE:-kraken}"
      MarketData__FixturesPath: "${MARKETDATA_FIXTURE_PATH:-fixtures/kraken-futures}"
      MarketData__ExtendFixtures: "${MARKETDATA_EXTEND_FIXTURES:-true}"
      Indicator__LookbackDays: "${INDICATOR_LOOKBACK_DAYS:-}"
      Indicator__LookbackDaysByTimeframe__M5: "${INDICATOR_LOOKBACK_DAYS_M5:-1}"
      Indicator__LookbackDaysByTimeframe__M15: "${INDICATOR_LOOKBACK_DAYS_M15:-1}"
      Indicator__LookbackDaysByTimeframe__M30: "${INDICATOR_LOOKBACK_DAYS_M30:-1}"
      Indicator__LookbackDaysByTimeframe__H1: "${INDICATOR_LOOKBACK_DAYS_H1:-2}"
      Indicator__LookbackDaysByTimeframe__H2: "${INDICATOR_LOOKBACK_DAYS_H2:-3}"
      Redis__ConnectionString: "${REDIS_CONNECTION_STRING:-redis:6379}"
      Redis__AlertQueueKey: "${REDIS_ALERT_QUEUE_KEY:-mvp:alerts}"
    ports:
      - "9464:9464"
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ai-trading-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api
      - worker

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
